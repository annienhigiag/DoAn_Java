<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:attr="data-lang=${session.lang}">
<head>
    <meta charset="UTF-8">
    <title>Trang cá nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=20260531">

    <style>

        .profile-layout{
            display:grid;
            grid-template-columns:270px 1fr;
            gap:30px;
            min-height:100vh;
            padding:24px;
            background:#edf4ff;
        }

        .profile-sidebar{
            background:white;
            border-radius:26px;
            padding:24px;
            box-shadow:0 10px 30px rgba(15,23,42,.08);
            height:max-content;
        }

        .profile-avatar{
            width:62px;
            height:62px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid #0f3d91;
        }

        .profile-menu a{
            display:flex;
            align-items:center;
            gap:12px;
            padding:16px;
            border-bottom:1px solid #e5e7eb;
            color:#4b5563;
            text-decoration:none;
            font-weight:600;
            transition:.2s;
        }

        .profile-menu a.active,
        .profile-menu a:hover{
            background:#dbeafe;
            border-radius:14px;
            color:#082b6b;
        }

        .profile-card{
            background:white;
            border-radius:26px;
            padding:34px;
            box-shadow:0 10px 30px rgba(15,23,42,.08);
        }

        .wallet-badge{
            background:#bfdbfe;
            color:#082b6b;
            padding:2px 8px;
            border-radius:4px;
            font-size:13px;
        }

        .avatar-upload-wrapper{
            position:relative;
            width:120px;
            margin:auto;
        }

        .avatar-preview{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #0f3d91;
            box-shadow:0 10px 25px rgba(15,61,145,.18);
        }

        .avatar-edit-btn{
            position:absolute;
            bottom:4px;
            right:4px;
            width:36px;
            height:36px;
            border-radius:50%;
            background:#0f3d91;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            font-size:16px;
            box-shadow:0 5px 12px rgba(0,0,0,.18);
            transition:.2s;
        }

        .avatar-edit-btn:hover{
            transform:scale(1.08);
            background:#082b6b;
        }

    </style>
</head>

<body>
<div class="global-lang-switch">
    <a href="/change-language?lang=vi" class="global-lang-btn" th:classappend="${session.lang != 'en'} ? 'active' : ''">VI</a>
    <a href="/change-language?lang=en" class="global-lang-btn" th:classappend="${session.lang == 'en'} ? 'active' : ''">EN</a>
</div>


<div class="profile-layout">

    <aside class="profile-sidebar">

        <div class="d-flex align-items-center gap-3 mb-4">
            <img class="profile-avatar"
                 th:src="${avatarHienThi != null && !#strings.isEmpty(avatarHienThi) ? avatarHienThi : '/images/default-avatar.png'}"
                 onerror="this.onerror=null;this.src='/images/default-avatar.png';">

            <div>
                <h5 class="fw-bold mb-1"
                    th:text="${hoTenHienThi}">
                </h5>

                <div style="height:8px"></div>
            </div>
        </div>

        <div class="profile-menu">
            <a href="/uu-dai-cua-toi">🎟️ Ưu đãi của tôi</a>
            <a href="/lich-su-ve"><span>🏷️</span> Chuyến đi của tôi</a>
            <a href="/vi-the">💳 Ví/Thẻ</a>
            <a class="active" href="/trang-ca-nhan">⚙️ Thông tin của tôi</a>
            <a href="/mua-ve"><span>🚌</span> Mua vé</a>
        </div>

    </aside>

    <main>

        <h3 class="mb-4">Thông tin của tôi</h3>

        <div class="profile-card">

            <div class="alert alert-success rounded-4"
                 th:if="${param.success}">
                Cập nhật thông tin thành công.
            </div>

            <div class="alert alert-danger rounded-4"
                 th:if="${param.error != null and param.error[0] == 'sdt'}">
                Số điện thoại phải gồm 10 chữ số và bắt đầu bằng 03, 05, 07, 08 hoặc 09.
            </div>

            <div class="alert alert-danger rounded-4"
                 th:if="${param.error != null and param.error[0] == 'hoten'}">
                Họ tên phải có ít nhất 2 ký tự.
            </div>

            <form method="post"
                  action="/trang-ca-nhan"
                  enctype="multipart/form-data">

                <div class="row">

                    <div class="col-md-3 text-center mb-4">

                        <div class="avatar-upload-wrapper">

                            <img class="avatar-preview"
                                 th:src="${avatarHienThi != null && !#strings.isEmpty(avatarHienThi) ? avatarHienThi : '/images/default-avatar.png'}"
                                 onerror="this.onerror=null;this.src='/images/default-avatar.png';"
                                 id="avatarPreview">

                            <label for="avatarInput"
                                   class="avatar-edit-btn">
                                ✏️
                            </label>

                            <input type="file"
                                   id="avatarInput"
                                   name="avatarFile"
                                   accept="image/*"
                                   hidden>

                        </div>

                        <p class="text-muted small mt-3">
                            Nhấn biểu tượng bút để đổi ảnh
                        </p>

                    </div>

                    <div class="col-md-9">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Tên đăng nhập
                                </label>

                                <input class="form-control form-control-lg rounded-3"
                                       th:value="${profile['TenDangNhap']}"
                                       readonly>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Tên của bạn
                                </label>

                                <input class="form-control form-control-lg rounded-3"
                                       name="hoTen"
                                       th:value="${profile['HoTen']}"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Ngày sinh
                                </label>

                                <input type="date"
                                       class="form-control form-control-lg rounded-3"
                                       name="ngaySinh"
                                       th:value="${profile['NgaySinh']}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Giới tính
                                </label>

                                <select class="form-select form-select-lg rounded-3"
                                        name="gioiTinh">

                                    <option value="Nam"
                                            th:selected="${profile['GioiTinh'] == 'Nam'}">
                                        Nam
                                    </option>

                                    <option value="Nữ"
                                            th:selected="${profile['GioiTinh'] == 'Nữ'}">
                                        Nữ
                                    </option>

                                    <option value="Khác"
                                            th:selected="${profile['GioiTinh'] == 'Khác'}">
                                        Khác
                                    </option>

                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Số điện thoại
                                </label>

                                <input class="form-control form-control-lg rounded-3"
                                       name="soDienThoai"
                                       th:value="${profile['SoDienThoai']}"
                                       pattern="^(03|05|07|08|09)\d{8}$"
                                       maxlength="10"
                                       title="Số điện thoại phải gồm 10 chữ số và bắt đầu bằng 03, 05, 07, 08 hoặc 09"
                                       required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    Địa chỉ mail
                                </label>

                                <input class="form-control form-control-lg rounded-3"
                                       name="email"
                                       th:value="${profile['Email']}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    CCCD
                                </label>

                                <input class="form-control form-control-lg rounded-3"
                                       name="cccd"
                                       th:value="${profile['CCCD']}">
                            </div>

                        </div>

                        <button class="btn btn-brand btn-lg rounded-pill px-5 mt-3">
                            Lưu thông tin
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </main>

</div>

<script>

    const avatarInput = document.getElementById('avatarInput');
    const avatarPreview = document.getElementById('avatarPreview');

    avatarInput.addEventListener('change', function(e){

        const file = e.target.files[0];

        if(file){
            if(!file.type.startsWith('image/')){
                alert('Vui lòng chọn đúng file ảnh.');
                avatarInput.value = '';
                avatarPreview.src = '/images/default-avatar.png';
                return;
            }

            avatarPreview.src = URL.createObjectURL(file);
        }

    });

</script>


<script th:inline="javascript">
    window.APP_LANG = /*[[${session.lang}]]*/ 'vi';
</script>
<script src="/js/i18n.js?v=20260608"></script>
</body>
</html>
