<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:attr="data-lang=${session.lang}">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=20260531">
    <title>Đăng nhập</title>
    <style>
        .login-lang-box {
            position: absolute;
            top: 18px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .login-lang-btn {
            min-width: 42px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.75);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            background: rgba(255,255,255,.15);
        }
        .login-lang-btn:hover,
        .login-lang-btn.active {
            background: #fff;
            color: #0b3d91;
        }
    </style>
</head>
<body>
<div class="hero-booking position-relative">
    <div class="login-lang-box">
        <a href="/change-language?lang=vi" class="login-lang-btn" th:classappend="${session.lang != 'en'} ? 'active' : ''">VI</a>
        <a href="/change-language?lang=en" class="login-lang-btn" th:classappend="${session.lang == 'en'} ? 'active' : ''">EN</a>
    </div>
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <span class="logo-pill">🚌</span>
            <div>
                <h3 class="fw-bold mb-0">Vé Xe Online</h3>
                <small>Đặt vé nhanh chóng, quản lý dễ dàng</small>
            </div>
        </div>
    </div>
</div>

<div class="container" style="margin-top:-70px;">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-bold text-center mb-2">Đăng nhập</h3>
                    <p class="text-muted text-center mb-4">Đăng nhập bằng tên đăng nhập hoặc Gmail đã liên kết</p>

                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

                    <form method="post" action="/login">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên đăng nhập hoặc Gmail</label>
                            <input name="username" class="form-control form-control-lg rounded-3" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <div class="input-group input-group-lg">
                                <input id="loginPassword" name="password" type="password" class="form-control rounded-start-3" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('loginPassword')">👁</button>
                            </div>
                        </div>

                        <button class="btn btn-brand btn-lg w-100 rounded-pill">Đăng nhập</button>
                    </form>

                    <div class="text-center mt-3">
                        <a class="text-brand fw-semibold" href="/forgot-password">Quên mật khẩu?</a>
                    </div>

                    <p class="text-center mt-3 mb-0">Chưa có tài khoản? <a class="text-brand fw-bold" href="/register">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
<script th:inline="javascript">window.APP_LANG = /*[[${session.lang}]]*/ 'vi';</script>
<script src="/js/i18n.js?v=20260608"></script>
</body>
</html>
