<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:attr="data-lang=${session.lang}">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=20260531">
    <title>Đăng ký</title>

    <style>
        .login-lang-box {
            position: absolute;
            top: 18px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .login-lang-btn {
            min-width: 42px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.75);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            background: rgba(255,255,255,.15);
        }
        .login-lang-btn:hover,
        .login-lang-btn.active {
            background: #fff;
            color: #0b3d91;
        }
    </style>
</head>
<body>
<div class="hero-booking position-relative">
    <div class="login-lang-box">
        <a href="/change-language?lang=vi" class="login-lang-btn" th:classappend="${session.lang != 'en'} ? 'active' : ''">VI</a>
        <a href="/change-language?lang=en" class="login-lang-btn" th:classappend="${session.lang == 'en'} ? 'active' : ''">EN</a>
    </div>
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <span class="logo-pill">🚌</span>
            <div>
                <h3 class="fw-bold mb-0">Tạo tài khoản</h3>
                <small>Đăng ký để đặt vé xe online</small>
            </div>
        </div>
    </div>
</div>

<div class="container" style="margin-top:-70px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <h3 class="fw-bold text-center mb-2">Đăng ký</h3>
                    <p class="text-muted text-center mb-4">Tạo tài khoản khách hàng</p>

                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                    <form method="post" action="/register" id="registerForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên đăng nhập</label>
                            <input name="username" th:value="${username}" class="form-control form-control-lg rounded-3" minlength="4" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <div class="input-group input-group-lg">
                                <input id="password" name="password" type="password" class="form-control rounded-start-3"
                                       pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}"
                                       title="Ít nhất 8 ký tự, gồm chữ in hoa, chữ thường, số và ký tự đặc biệt" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')">👁</button>
                            </div>
                            <small class="text-muted">Yêu cầu: chữ in hoa, chữ thường, số, ký tự đặc biệt và ít nhất 8 ký tự.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nhập lại mật khẩu</label>
                            <div class="input-group input-group-lg">
                                <input id="confirmPassword" name="confirmPassword" type="password" class="form-control rounded-start-3" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirmPassword')">👁</button>
                            </div>
                            <small id="matchMsg" class="text-danger d-none">Mật khẩu nhập lại không trùng khớp.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input name="phone" th:value="${phone}" class="form-control form-control-lg rounded-3"
                                   maxlength="10" pattern="^(03|05|07|08|09)\d{8}$" title="Số điện thoại phải gồm 10 chữ số và bắt đầu bằng 03, 05, 07, 08 hoặc 09" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Email</label>
                            <input name="email" type="email" th:value="${email}" class="form-control form-control-lg rounded-3" placeholder="example@gmail.com">
                        </div>

                        <button class="btn btn-brand btn-lg w-100 rounded-pill">Đăng ký</button>
                    </form>

                    <p class="text-center mt-4 mb-0">Đã có tài khoản? <a class="text-brand fw-bold" href="/login">Đăng nhập</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}

const form = document.getElementById('registerForm');
const pass = document.getElementById('password');
const confirm = document.getElementById('confirmPassword');
const msg = document.getElementById('matchMsg');

function checkMatch() {
    if (confirm.value && pass.value !== confirm.value) {
        msg.classList.remove('d-none');
        return false;
    }
    msg.classList.add('d-none');
    return true;
}

pass.addEventListener('input', checkMatch);
confirm.addEventListener('input', checkMatch);
form.addEventListener('submit', function(e) {
    if (!checkMatch()) e.preventDefault();
});
</script>
<script th:inline="javascript">window.APP_LANG = /*[[${session.lang}]]*/ 'vi';</script>
<script src="/js/i18n.js?v=20260608"></script>
</body>
</html>
