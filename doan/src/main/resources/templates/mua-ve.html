<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:attr="data-lang=${session.lang}">
<head>
    <meta charset="UTF-8">
    <title>Mua vé xe online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css?v=20260531">

    <style>
        .top-user{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .top-user img{
            width:42px;
            height:42px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #0f3d91;
        }

        .review-box{
            background:white;
            border-radius:24px;
            padding:30px;
            box-shadow:0 10px 30px rgba(15,23,42,.08);
            margin-bottom:40px;
        }

        .rating-row{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:10px;
        }

        .rating-label{
            width:35px;
            font-weight:700;
        }

        .rating-bar{
            flex:1;
            height:10px;
            border-radius:999px;
            background:#e5e7eb;
            overflow:hidden;
        }

        .rating-fill{
            height:100%;
            background:#0f3d91;
            border-radius:999px;
        }

        .review-item{
            padding:18px 0;
            border-bottom:1px solid #e5e7eb;
        }

        .star-select input{
            display:none;
        }

        .star-select label{
            font-size:28px;
            color:#d1d5db;
            cursor:pointer;
        }

        .star-select input:checked ~ label,
        .star-select label:hover,
        .star-select label:hover ~ label{
            color:#f59e0b;
        }

        .lang-btn{
            border:1px solid #0f3d91;
            color:#0f3d91;
            background:white;
            padding:6px 12px;
            border-radius:999px;
            text-decoration:none;
            font-weight:700;
        }

        .lang-btn.active{
            background:#0f3d91;
            color:white;
        }

        .route-time-box{
            display:grid;
            grid-template-columns:145px 1fr 145px;
            align-items:center;
            gap:12px;
        }

        .time-point b{
            display:block;
            color:#082b6b;
            font-size:15px;
            font-weight:800;
            line-height:1.35;
        }

        .time-point small{
            color:#6b7280;
            font-size:12px;
        }

        .trip-card{
            transition:.25s;
        }

        .trip-card:hover{
            transform:translateY(-4px);
            box-shadow:0 18px 40px rgba(15,23,42,.14);
        }

        .price{
            color:#082b6b;
            font-weight:900;
            font-size:28px;
            letter-spacing:.3px;
        }

        @media(max-width:576px){
            .route-time-box{
                grid-template-columns:1fr;
                gap:10px;
            }

            .time-point.text-end{
                text-align:left !important;
            }
        }

    </style>
</head>

<body>

<div class="mua-ve-lang-switch">
    <a href="/change-language?lang=vi" class="lang-btn" th:classappend="${session.lang != 'en'} ? 'active' : ''">VI</a>
    <a href="/change-language?lang=en" class="lang-btn" th:classappend="${session.lang == 'en'} ? 'active' : ''">EN</a>
</div>

<nav class="navbar nav-red px-4">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-dark" href="/mua-ve">
        <span class="logo-pill">🚌</span>
        <span th:if="${session.lang == 'en'}">Bus Ticket Online</span>
        <span th:unless="${session.lang == 'en'}">Vé Xe Online</span>
    </a>

    <div class="ms-auto d-flex align-items-center gap-3">
        <a href="/trang-ca-nhan" class="btn btn-outline-secondary rounded-pill"
           th:text="${session.lang == 'en'} ? 'Profile' : 'Trang cá nhân'"></a>

        <a href="/lich-su-ve" class="btn btn-outline-secondary rounded-pill"
           th:text="${session.lang == 'en'} ? 'My Trips' : 'Chuyến đi của tôi'"></a>

        <div class="top-user">
            <img th:src="${avatarHienThi}">
            <b th:text="${hoTenHienThi}"></b>
        </div>

        <a href="/logout" class="btn btn-outline-danger rounded-pill"
           th:text="${session.lang == 'en'} ? 'Logout' : 'Đăng xuất'"></a>
    </div>
</nav>

<section class="hero-booking">
    <div class="container">
        <span class="badge bg-warning text-dark rounded-pill mb-3"
              th:text="${session.lang == 'en'} ? 'Online booking deals' : 'Ưu đãi đặt vé online'"></span>

        <h1 class="fw-bold display-5 mb-3"
            th:text="${session.lang == 'en'} ? 'Book bus tickets quickly' : 'Đặt vé xe khách nhanh chóng'"></h1>

        <p class="lead mb-0"
           th:text="${session.lang == 'en'} ? 'Search routes, choose seats and pay easily.' : 'Tìm chuyến theo điểm đi, điểm đến và chọn ghế phù hợp.'"></p>
    </div>
</section>

<div class="container">

    <div class="search-box">
        <form class="row g-3" method="get" action="/mua-ve">
            <div class="col-md-4">
                <label class="form-label fw-semibold"
                       th:text="${session.lang == 'en'} ? 'From' : 'Điểm đi'"></label>
                <input class="form-control" name="diemDi" th:value="${diemDi}" placeholder="VD: Miền Đông, BX01">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-semibold"
                       th:text="${session.lang == 'en'} ? 'To' : 'Điểm đến'"></label>
                <input class="form-control" name="diemDen" th:value="${diemDen}" placeholder="VD: Hà Nội, BX04">
            </div>

            <div class="col-md-4 d-flex align-items-end">
                <button class="btn btn-brand w-100 rounded-pill py-3"
                        th:text="${session.lang == 'en'} ? 'Search buses' : 'Tìm kiếm xe'"></button>
            </div>
        </form>
    </div>

    <h3 class="fw-bold mt-4 mb-3"
        th:text="${session.lang == 'en'} ? 'Schedules and fares' : 'Lịch trình và giá vé'"></h3>

    <div class="alert alert-warning rounded-4" th:if="${#lists.isEmpty(lichChay)}"
         th:text="${session.lang == 'en'} ? 'No suitable trips found.' : 'Không tìm thấy chuyến xe phù hợp.'"></div>

    <div class="row">
        <div class="col-lg-6 mb-4" th:each="lc : ${lichChay}">
            <div class="card trip-card h-100">
                <div class="card-body p-4">
                    <span class="bus-badge">🚌 <span th:text="${lc['LoaiXe']} ?: 'Xe khách'"></span></span>

                    <h5 class="fw-bold mt-3 mb-1">
                        <span th:text="${lc['TenBenDi']}"></span>
                        →
                        <span th:text="${lc['TenBenDen']}"></span>
                    </h5>

                    <small class="text-muted">
                        Xe <span th:text="${lc['HieuXe']}"></span> -
                        <span th:text="${lc['BienSo']}"></span>
                    </small>

                    <div class="route-time-box my-4">

                        <div class="time-point">
                            <b th:text="${#temporals.format(lc['GioKhoiHanh'], 'dd/MM/yyyy HH:mm')}"></b>
                            <small th:text="${session.lang == 'en'} ? 'Departure' : 'Khởi hành'"></small>
                        </div>

                        <div class="route-line">
                            <div class="route-dot"></div>
                            <div class="route-dash"></div>
                            <div class="route-dot"></div>
                        </div>

                        <div class="time-point text-end">
                            <b th:text="${lc['GioDenDuKien'] != null ? #temporals.format(lc['GioDenDuKien'], 'dd/MM/yyyy HH:mm') : 'Đang cập nhật'}"></b>
                            <small th:text="${session.lang == 'en'} ? 'Estimated arrival' : 'Đến dự kiến'"></small>
                        </div>

                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3">
                        <div>
                            <small class="text-muted"
                                   th:text="${session.lang == 'en'} ? 'Vehicle type' : 'Loại xe'"></small>
                            <div class="fw-bold" th:text="${lc['LoaiXe']}"></div>
                        </div>

                        <div class="text-end">
                            <div class="price">
                                <span th:text="${#numbers.formatDecimal(lc['GiaCoBan'], 0, 'POINT', 0, 'COMMA')} + ' VNĐ'"></span>
                            </div>

                            <a class="btn btn-brand rounded-pill px-4 mt-2"
                               th:href="@{'/chon-ghe/' + ${lc['MaLichChay']}}"
                               th:text="${session.lang == 'en'} ? 'Book now' : 'Đặt ngay'">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- REVIEW -->
    <div class="review-box mt-5">

        <h3 class="fw-bold mb-4"
            th:text="${session.lang == 'en'} ? 'Customer Reviews' : 'Đánh giá khách hàng'"></h3>

        <div class="rating-row" th:each="r : ${ratingSummary}">
            <span class="rating-label">
                <span th:text="${r['SoSao']}"></span>★
            </span>

            <div class="rating-bar">
                <div class="rating-fill"
                     th:style="'width:' + ${r['PhanTram']} + '%'">
                </div>
            </div>

            <span th:text="${r['PhanTram']} + '%'"></span>
        </div>

        <hr class="my-4">

        <form method="post" action="/danh-gia" class="mb-4">
            <label class="form-label fw-bold"
                   th:text="${session.lang == 'en'} ? 'Your rating' : 'Đánh giá của bạn'"></label>

            <select name="soSao" class="form-select rounded-3 mb-3" required>
                <option value="5">5 sao</option>
                <option value="4">4 sao</option>
                <option value="3">3 sao</option>
                <option value="2">2 sao</option>
                <option value="1">1 sao</option>
            </select>

            <textarea name="noiDung"
                      class="form-control rounded-4 mb-3"
                      rows="3"
                      required
                      th:placeholder="${session.lang == 'en'} ? 'Write your comment...' : 'Nhập bình luận của bạn...'"></textarea>

            <button class="btn btn-brand rounded-pill px-4"
                    th:text="${session.lang == 'en'} ? 'Submit review' : 'Gửi đánh giá'"></button>
        </form>

        <div th:each="dg : ${danhSachDanhGia}" class="review-item">
            <div class="d-flex justify-content-between">
                <h6 class="fw-bold" th:text="${dg['HoTen']}"></h6>
                <small class="text-muted" th:text="${dg['NgayDanhGia']}"></small>
            </div>

            <div class="text-warning mb-2">
                <span th:each="i : ${#numbers.sequence(1, dg['SoSao'])}">★</span>
            </div>

            <p class="mb-0" th:text="${dg['NoiDung']}"></p>
        </div>

    </div>

</div>


<script th:inline="javascript">
    window.APP_LANG = /*[[${session.lang}]]*/ 'vi';
</script>
<script src="/js/i18n.js?v=20260608"></script>
</body>
</html>
